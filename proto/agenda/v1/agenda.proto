syntax = "proto3";

package agenda.v1;

option go_package = "go-challenge-agenda/gen/agenda/v1;agendav1";

// ─── Enums ───────────────────────────────────────────────────────────────────

enum ReservationType {
  RESERVATION_TYPE_UNSPECIFIED = 0;
  RESERVATION_TYPE_FIRST_VISIT = 1;
  RESERVATION_TYPE_FOLLOW_UP = 2;
  // TODO: add extended service types (labs, therapy, etc.)
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  RESERVATION_STATUS_CONFIRMED = 1;
  RESERVATION_STATUS_CANCELLED = 2;
}

enum RecurrenceType {
  RECURRENCE_TYPE_NONE = 0;
  RECURRENCE_TYPE_DAILY = 1;
  RECURRENCE_TYPE_WEEKLY = 2;
  RECURRENCE_TYPE_MONTHLY = 3;
}

// ─── Entities ─────────────────────────────────────────────────────────────────

message Doctor {
  string id = 1;
  string name = 2;
  string specialty = 3;
  repeated WorkingHours working_hours = 4;
}

message WorkingHours {
  int32 weekday = 1; // 0=Sunday … 6=Saturday
  string from = 2;   // "09:00"
  string to = 3;     // "17:00"
}

message Patient {
  string id = 1;
  string name = 2;
  string phone = 3;
  string email = 4;
}

message Reservation {
  string id = 1;
  string doctor_id = 2;
  string patient_id = 3;
  string starts_at = 4; // RFC3339
  string ends_at = 5;   // RFC3339
  ReservationType type = 6;
  ReservationStatus status = 7;
}

message BlockedSlot {
  string id = 1;
  string doctor_id = 2;
  string starts_at = 3; // RFC3339
  string ends_at = 4;   // RFC3339
  string reason = 5;
  RecurrenceType recurrence_type = 6;
  string recurrence_until = 7; // RFC3339, empty = no recurrence
}

message AvailableSlot {
  string starts_at = 1;
  string ends_at = 2;
}

message TimeRange {
  string from = 1;
  string to = 2;
}

// ─── Request / Response messages ─────────────────────────────────────────────

message GetDoctorRequest { string id = 1; }
message GetDoctorResponse { Doctor doctor = 1; }

message ListDoctorsRequest {}
message ListDoctorsResponse { repeated Doctor doctors = 1; }

message GetAvailabilityRequest {
  string doctor_id = 1;
  string date = 2; // "2024-03-15"
  ReservationType reservation_type = 3;
}
message GetAvailabilityResponse {
  repeated AvailableSlot slots = 1;
  repeated TimeRange free_ranges = 2;
}

message CreateBlockedSlotRequest {
  string doctor_id = 1;
  string starts_at = 2;
  string ends_at = 3;
  string reason = 4;
  RecurrenceType recurrence_type = 5;
  string recurrence_until = 6;
}
message CreateBlockedSlotResponse { BlockedSlot blocked_slot = 1; }

message ListBlockedSlotsRequest {
  string doctor_id = 1;
  string from = 2; // RFC3339
  string to = 3;   // RFC3339
}
message ListBlockedSlotsResponse { repeated BlockedSlot blocked_slots = 1; }

message DeleteBlockedSlotRequest { string id = 1; }
message DeleteBlockedSlotResponse {}

message GetPatientRequest { string id = 1; }
message GetPatientResponse { Patient patient = 1; }

message ListPatientsRequest {}
message ListPatientsResponse { repeated Patient patients = 1; }

message CreatePatientRequest {
  string name  = 1;
  string phone = 2;
  string email = 3;
}
message CreatePatientResponse { Patient patient = 1; }

message UpdatePatientRequest {
  string id    = 1;
  string name  = 2;
  string phone = 3;
  string email = 4;
}
message UpdatePatientResponse { Patient patient = 1; }

message DeletePatientRequest { string id = 1; }
message DeletePatientResponse {}

message CreateReservationRequest {
  string doctor_id = 1;
  string starts_at = 2; // RFC3339
  ReservationType type = 3;
  // Patient fields — used to register on first visit
  string patient_name = 4;
  string patient_phone = 5;
  string patient_email = 6;
  // Set if patient already exists
  string patient_id = 7;
}
message CreateReservationResponse { Reservation reservation = 1; }

message GetReservationRequest { string id = 1; }
message GetReservationResponse { Reservation reservation = 1; }

message ListReservationsRequest {
  string doctor_id = 1;
  string from = 2;
  string to = 3;
  // If set, list reservations for this patient (user) instead of by doctor_id.
  string patient_id = 4;
}
message ListReservationsResponse { repeated Reservation reservations = 1; }

message CancelReservationRequest { string id = 1; }
message CancelReservationResponse {}

// TODO: add UpdateReservationRequest / UpdateReservationResponse

// ─── Service ──────────────────────────────────────────────────────────────────

service AgendaService {
  // Doctors
  rpc GetDoctor(GetDoctorRequest) returns (GetDoctorResponse);
  rpc ListDoctors(ListDoctorsRequest) returns (ListDoctorsResponse);

  // Availability
  rpc GetAvailability(GetAvailabilityRequest) returns (GetAvailabilityResponse);

  // Blocked slots
  rpc CreateBlockedSlot(CreateBlockedSlotRequest) returns (CreateBlockedSlotResponse);
  rpc ListBlockedSlots(ListBlockedSlotsRequest) returns (ListBlockedSlotsResponse);
  rpc DeleteBlockedSlot(DeleteBlockedSlotRequest) returns (DeleteBlockedSlotResponse);

  // Reservations
  rpc CreateReservation(CreateReservationRequest) returns (CreateReservationResponse);
  rpc GetReservation(GetReservationRequest) returns (GetReservationResponse);
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);
  rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);

  // TODO: UpdateReservation

  // Users (patients)
  rpc GetPatient(GetPatientRequest) returns (GetPatientResponse);
  rpc ListPatients(ListPatientsRequest) returns (ListPatientsResponse);
  rpc CreatePatient(CreatePatientRequest) returns (CreatePatientResponse);
  rpc UpdatePatient(UpdatePatientRequest) returns (UpdatePatientResponse);
  rpc DeletePatient(DeletePatientRequest) returns (DeletePatientResponse);
}
